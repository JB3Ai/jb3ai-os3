name: Deploy to cPanel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build main app
        run: npm run build

      - name: Build brochures app
        run: cd brochures && npm install && npm run build && cd ..

      - name: Deploy main dist to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: ./dist/
          server-dir: ./
          timeout: 600000
          log-level: verbose
          dangerous-clean-slate: false
          exclude: |
            **/.git*/**
            **/.git*
            **/node_modules/**
            **/.DS_Store

      - name: Deploy brochures dist to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: ./brochures/dist/
          server-dir: ./brochures/
          timeout: 600000
          log-level: verbose
          dangerous-clean-slate: false
