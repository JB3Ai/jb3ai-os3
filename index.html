<!DOCTYPE html>
<html lang="en" class="font-s">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="JB³Ai is a managed AI operating system that unifies business tools, intelligence, and security into a single controlled environment for professional teams." />
  <title>JB³Ai | Managed AI Operating System for Business</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --base-size: 26px;
      --accent-cyan: #06b6d4;
      --accent-purple: #a855f7;
      --accent-green: #10b981;
      --accent-glow-cyan: rgba(6, 182, 212, 0.3);
    }

    /* Typography Scaling: New Small=26px, New Large=40px */
    html.font-s {
      --base-size: 26px;
    }

    html.font-l {
      --base-size: 40px;
    }

    body {
      font-family: 'Poppins', sans-serif;
      font-size: var(--base-size);
      color: #e5e5e5;
      line-height: 1.5;
      transition: font-size 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      overflow-x: hidden;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    .font-os {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Premium Hex-Plate Icons */
    .icon-plate {
      position: relative;
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.05) 0%, transparent 80%), rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .icon-plate svg {
      color: #71717a;
      transition: color 0.4s ease, filter 0.4s ease, transform 0.4s ease;
      z-index: 2;
      width: 24px;
      height: 24px;
    }

    .group:hover .icon-plate {
      border-color: var(--accent-cyan);
      transform: rotate(10deg) scale(1.1);
      background: rgba(6, 182, 212, 0.05);
    }

    .group:hover .icon-plate svg {
      color: var(--accent-cyan);
      filter: drop-shadow(0 0 8px var(--accent-glow-cyan));
      transform: rotate(-10deg);
    }

    /* Scroll Reveal */
    .scroll-reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .scroll-reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .os-panel {
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #1c1c1f;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #2d2d30;
    }

    .text-xs {
      font-size: 0.5em;
    }

    .text-sm {
      font-size: 0.7em;
    }

    .text-base {
      font-size: 1em;
    }

    .text-lg {
      font-size: 1.2em;
    }

    .text-xl {
      font-size: 1.4em;
    }

    .text-2xl {
      font-size: 1.8em;
    }

    .text-3xl {
      font-size: 2.2em;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
      }
    }
    </script>
  <script type="module" src="/index.tsx"></script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script>
    window.addEventListener('scroll', () => {
      const offset = window.pageYOffset * 0.15;
      document.documentElement.style.setProperty('--scroll-offset', `-${offset}px`);
    });
  </script>
</body>

</html>
