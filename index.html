<!DOCTYPE html>
<html lang="en" class="font-s">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="JB³Ai is a managed AI operating system that unifies business tools, intelligence, and security into a single controlled environment for professional teams." />
  <title>JB³Ai | Managed AI Operating System for Business</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="alternate icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "jb3-primary": "#6AFF7E",
            "jb3-teal": "#54E0E0",
            "jb3-coolgray": "#CED5E0",
            "jb3-light": "#F8F8F8",
            "jb3-subtle": "#B0B8C0",
            "jb3-divider": "#1E2A4C",
          },
        }
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style type="text/tailwindcss">
    @layer base {
      :root {
        --base-size: 26px;
        --accent-cyan: #06b6d4;
        --accent-purple: #a855f7;
        --accent-green: #10b981;
        --accent-glow-cyan: rgba(6, 182, 212, 0.3);
      }

      html.font-s {
        --base-size: 26px;
      }

      html.font-l {
        --base-size: 40px;
      }

      body {
        font-family: 'Poppins', sans-serif;
        font-size: var(--base-size);
        color: #e5e5e5;
        line-height: 1.5;
        transition: font-size 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        overflow-x: hidden;
      }

      html {
        scroll-behavior: smooth;
      }

      h1, h2, h3, h4, h5, h6, .font-os {
        font-family: 'Poppins', sans-serif;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
    }

    @layer components {
      .icon-plate {
        position: relative;
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, rgba(255, 255, 255, 0.05) 0%, transparent 80%), rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.08);
        clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
        transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      }

      .icon-plate svg {
        color: #71717a;
        transition: color 0.4s ease, filter 0.4s ease, transform 0.4s ease;
        z-index: 2;
        width: 24px;
        height: 24px;
      }

      .os-panel {
        background: rgba(10, 10, 10, 0.85);
        backdrop-filter: blur(50px);
        -webkit-backdrop-filter: blur(50px);
        border: 1px solid rgba(255, 255, 255, 0.04);
      }

      .hero-bg {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        transform: translateY(var(--scroll-offset));
        will-change: transform;
      }

      .hero-fg {
        position: relative;
        z-index: 10;
        pointer-events: auto;
        transform: none !important;
        animation: none !important;
      }

      /* Enhanced Hero Accessibility & Aesthetics */
      .hero-title {
        color: theme("colors.jb3-light");
        text-shadow: 0px 3px 10px rgba(0, 0, 0, 0.6);
      }

      .hero-subtitle {
        color: theme("colors.jb3-coolgray");
        text-shadow: 0px 2px 8px rgba(0, 0, 0, 0.5);
      }

      .os3-hero .cube-static,
      .os3-hero video {
        filter: brightness(1.25) contrast(1.15) saturate(1.1);
        z-index: 0;
      }

      .os3-hero::before {
        content: "";
        position: absolute;
        inset: -40px;
        background: radial-gradient(circle at center, rgba(106, 255, 126, 0.16), transparent 80%);
        filter: blur(80px);
        pointer-events: none;
        z-index: 1;
      }

      .os3-hero .hero-content {
        z-index: 10;
      }

      /* Buttons & Interactive */
      .btn-primary {
        background-color: theme("colors.jb3-primary") !important;
        color: #0F0F0F !important;
        border: none;
        transition: all 0.2s ease-in-out;
      }

      .btn-primary:hover {
        background-color: theme("colors.jb3-teal") !important;
        color: #0F0F0F !important;
      }

      header a, header button {
        color: #f8f8f8;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
      }

      /* UI Layer Clarity */
      .overlay-dark {
        background: rgba(0, 0, 0, 0.45);
      }

      .card {
        background: rgba(14, 17, 25, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.06);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
      }

      /* Headings & Dividers */
      .section-heading {
        color: theme("colors.jb3-light");
        border-bottom: 2px solid theme("colors.jb3-primary");
        padding-bottom: 0.25em;
        display: inline-block;
        font-weight: 600;
      }

      .section-divider img {
        filter: brightness(1.25) contrast(1.1);
        mix-blend-mode: normal;
      }
    }

    @layer utilities {
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }

      .scroll-reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: all 1.2s cubic-bezier(0.23, 1, 0.32, 1);
      }

      .scroll-reveal.visible {
        opacity: 1;
        transform: translateY(0);
      }
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #1c1c1f;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #2d2d30;
    }

    .text-xs { font-size: 0.5em; }
    .text-sm { font-size: 0.7em; }
    .text-base { font-size: 1em; }
    .text-lg { font-size: 1.2em; }
    .text-xl { font-size: 1.4em; }
    .text-2xl { font-size: 1.8em; }
    .text-3xl { font-size: 2.2em; }
  </style>

  <script type="importmap">
    {
      "imports": {
        "react/": "https://esm.sh/react@^19.2.3/",

        "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
      }
    }
  </script>

</head>

<body>
  <div id="root"></div>
  <script>
    window.addEventListener('scroll', () => {
      const offset = window.pageYOffset * 0.15;
      document.documentElement.style.setProperty('--scroll-offset', `-${offset}px`);
    });
  </script>
</body>

</html>
